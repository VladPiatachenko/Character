  name: Java CI with Maven

  on:
    push:
      branches: [ "feature" ]

  permissions:
    contents: write
    pull-requests: write

  jobs:
    build:

      runs-on: ubuntu-latest

      steps:
        - uses: actions/checkout@v4
        - name: Set up JDK 24
          uses: actions/setup-java@v4
          with:
            java-version: '24'
            distribution: 'temurin'
            cache: maven
        - name: Build with Maven
          run: mvn -B package --file pom.xml

    promote-to-master:
      needs: build
      runs-on: ubuntu-latest
      # Виконуємо тільки якщо:
      # 1) це push (не pull_request)
      # 2) job build завершилась успішно
      if: github.event_name == 'push' && needs.build.result == 'success'

      steps:
        - name: Checkout repo with all branches
          uses: actions/checkout@v4
          with:
            fetch-depth: 0  # потрібно, щоб були всі гілки, не тільки deploy

        - name: Configure Git user
          run: |
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
        - name: Merge feature -> master (fast-forward only)
          run: |
            # Переходимо на гілку render
            git checkout master
            # Підтягнути останні зміни з origin (про всяк випадок)
            git fetch origin
            # Зробити fast-forward merge з deploy
            git merge --no-ff origin/feature 
            # Відправити оновлену render назад на GitHub
            git push origin master
